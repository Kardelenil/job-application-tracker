{% extends "layout.html" %}
{% block content %}
<h2>Kayıt Ol</h2>
<form method="POST">
    <div><label>Kullanıcı Adı:</label><br><input type="text" name="username" required></div>
    <div><label>Email:</label><br><input type="email" name="email" required></div>
    <div><label>Şifre:</label><br><input type="password" name="password" required></div>
    <button type="submit">Kayıt Ol</button>
</form>
<p style="margin-top:15px">Zaten hesabın var? <a href="/login">Giriş Yap</a></p>
{% endblock %}
